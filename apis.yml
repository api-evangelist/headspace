description: >-
  Headspace is a global mental health platform offering consumer mindfulness, meditation, and
  sleep content alongside Headspace Care (formerly Ginger) — on-demand coaching, therapy,
  and psychiatry — and Headspace EAP. The B2B business (Headspace for Organizations) serves
  4,000+ employers, health plans, and consultants in 190+ countries with a stratified care
  model (AI companion Ebb, coaches, therapists, psychiatrists). Integration surfaces for
  enterprise customers — eligibility file feeds, SSO, SCIM, benefit-platform connectors —
  are delivered under enterprise contracts and are not exposed via a public developer
  portal. There is no public REST API, no published OpenAPI specification, and no self-serve
  partner onboarding.
